<?php
/* UI-02 (D-06 / D-07): per-file errors. */
$arErrors = $errors ?? [];
?>
<?php if (count($arErrors) > 0): ?>
    <div class="alert alert-danger" id="invoiceUploadErrorsAlert">
        <h4>Upload errors</h4>
        <ul>
            <?php foreach ($arErrors as $arErr): ?>
                <li><strong><?= e((string) ($arErr['filename'] ?? '')) ?></strong>: <?= e((string) ($arErr['message'] ?? '')) ?></li>
            <?php endforeach; ?>
        </ul>
    </div>
<?php endif; ?>
