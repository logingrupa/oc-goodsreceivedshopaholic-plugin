<?php
/* UI-09 / D-16 / D-17: pre-parse duplicate-detection reject screen. */
$arRejects = $rejects ?? [];
?>
<?php if (count($arRejects) > 0): ?>
    <?php foreach ($arRejects as $arRejected):
        $iPriorId = (int) ($arRejected['prior_invoice_id'] ?? 0);
        $sInvoiceNumber = (string) ($arRejected['invoice_number'] ?? '');
        $sPriorAppliedAt = (string) ($arRejected['prior_applied_at'] ?? '—');
        $sPriorAppliedBy = (string) ($arRejected['prior_applied_by'] ?? '—');
        $iPriorStockAdded = (int) ($arRejected['prior_stock_added_units'] ?? 0);
    ?>
        <div class="alert alert-warning" data-prior-invoice-id="<?= $iPriorId ?>">
            <h4>Duplicate invoice rejected</h4>
            <p>Invoice <strong>#<?= e($sInvoiceNumber) ?></strong> was previously applied.</p>
            <ul>
                <li>Prior applied at: <strong><?= e($sPriorAppliedAt) ?></strong></li>
                <li>Prior applied by user: <strong><?= e($sPriorAppliedBy) ?></strong></li>
                <li>Prior stock added (units): <strong><?= $iPriorStockAdded ?></strong></li>
                <li>Prior invoice id: <strong><?= $iPriorId ?></strong></li>
            </ul>
            <button type="button"
                    class="btn btn-warning btn-sm"
                    data-control="popup"
                    data-handler="onOverrideShowConfirm"
                    data-request-data="prior_invoice_id: <?= $iPriorId ?>">
                Override and re-import
            </button>
            <p class="help-block">Use the Override flow if reapply is intended.</p>
        </div>
    <?php endforeach; ?>
<?php endif; ?>
