<?php
/* Apply button surfaces here when the invoice is in `parsed` status —
 * UAT 2026-05-05: operator uploaded multiple `.HTM` files at once,
 * applied one from the inline modal, then could not reach the
 * remaining parsed invoices' Apply buttons (the upload modal had
 * closed; re-upload was blocked by the parsed-pending duplicate gate
 * from commit 89e5197). The detail-page Apply button gives operators
 * a stable surface to apply each parsed invoice without depending on
 * the in-popup button list.
 *
 * Wires onApplyShowConfirm AJAX handler — same path used by the
 * upload modal's per-file Apply button (controllers/Invoices.php:529).
 */
$obInvoice = $this->formGetModel();
$bIsParsed = $obInvoice instanceof \Logingrupa\GoodsReceivedShopaholic\Models\Invoice
    && (string) $obInvoice->status === \Logingrupa\GoodsReceivedShopaholic\Models\Invoice::STATUS_PARSED;
?>
<?= Form::open(['class' => 'layout']) ?>
    <div class="layout-row">
        <?= $this->formRender() ?>
    </div>
    <div class="layout-row">
        <?= $this->relationRender('lines') ?>
    </div>
    <div class="form-buttons">
        <a href="<?= Backend::url('logingrupa/goodsreceivedshopaholic/invoices') ?>" class="btn btn-default oc-icon-arrow-left">
            <?= e(trans('backend::lang.form.cancel')) ?>
        </a>
        <?php if ($bIsParsed): ?>
            <button type="button"
                    class="btn btn-primary oc-icon-check"
                    data-control="popup"
                    data-handler="onApplyShowConfirm"
                    data-request-data="invoice_id: <?= (int) $obInvoice->id ?>">
                <?= e(trans('logingrupa.goodsreceivedshopaholic::lang.apply.button_now')) ?>
            </button>
        <?php endif; ?>
    </div>
<?= Form::close() ?>
